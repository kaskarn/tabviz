# Diagnostic workflow (manual dispatch only) — profiles save_plot() on the
# ubuntu runner to explain why docs/guide/export.qmd renders ~100s/chunk on
# CI vs ~1s locally (quarto-publish runs at 8-11 min for that one page).
# Delete once the cause is fixed.
on: workflow_dispatch

name: Perf probe

jobs:
  probe:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup R
        uses: r-lib/actions/setup-r@v2
        with:
          use-public-rspm: true

      - name: Setup R dependencies
        uses: r-lib/actions/setup-r-dependencies@v2
        with:
          extra-packages: local::.
          needs: website

      - name: Profile save_plot components
        run: Rscript .github/workflows/perf-probe.R
