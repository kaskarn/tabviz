# Diagnostic workflow (manual dispatch only) — profiles save_plot() on the
# ubuntu runner to explain why docs/guide/export.qmd renders ~100s/chunk on
# CI vs ~1s locally (quarto-publish runs at 8-11 min for that one page).
# Delete once the cause is fixed.
on: workflow_dispatch

name: Perf probe

jobs:
  probe:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup R
        uses: r-lib/actions/setup-r@v2
        with:
          use-public-rspm: true

      - name: Setup R dependencies
        uses: r-lib/actions/setup-r-dependencies@v2
        with:
          extra-packages: local::.
          needs: website

      - name: Profile save_plot components
        run: Rscript .github/workflows/perf-probe.R

      - name: Setup Quarto
        uses: quarto-dev/quarto-actions/setup@v2

      - name: Build minimal repro qmd
        run: |
          mkdir -p /tmp/probe-qmd
          cp .github/workflows/perf-probe-repro.qmd /tmp/probe-qmd/repro.qmd

      - name: Render repro via quarto (timed)
        run: |
          cd /tmp/probe-qmd
          time quarto render repro.qmd
          grep -h PROBE repro.html || true

      - name: Render repro via bare knitr (timed)
        run: |
          cd /tmp/probe-qmd
          time Rscript -e 'knitr::knit("repro.qmd", output="knitr-out.md", quiet=TRUE)'
          grep PROBE knitr-out.md || true

      # Round 3 result: single page in project context = 19s on the runner,
      # zero swap. The stall ONLY exists in the full-site sequence. Round 4:
      # reproduce the full render with a process sampler so the slow window
      # is attributable (R spinning? deno? disk? idle-blocked?).
      - name: Full site render with process sampler
        run: |
          (while true; do
             echo "SAMPLE $(date -u +%H:%M:%S) load=$(cut -d' ' -f1 /proc/loadavg)"
             ps aux --sort=-%cpu | head -6 | tail -5 | awk '{printf "SAMPLE   %s %s%% %sMB %s\n", $1, $3, int($6/1024), $11}'
             sleep 15
           done) > /tmp/sampler.log 2>&1 &
          SAMPLER=$!
          rm -rf docs/_freeze docs/_site docs/.quarto
          # --line-buffered is load-bearing: block-buffered grep collapses
          # many lines into one Actions timestamp (saw this in round 3),
          # destroying the per-chunk attribution this probe exists for.
          time quarto render docs --cache-refresh 2>&1 | grep --line-buffered -E "qmd|processing|chunk" | head -400
          kill $SAMPLER || true

      - name: Dump sampler log
        if: always()
        run: cat /tmp/sampler.log | tail -400
