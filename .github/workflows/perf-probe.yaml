# Diagnostic workflow (manual dispatch only) — profiles save_plot() on the
# ubuntu runner to explain why docs/guide/export.qmd renders ~100s/chunk on
# CI vs ~1s locally (quarto-publish runs at 8-11 min for that one page).
# Delete once the cause is fixed.
on: workflow_dispatch

name: Perf probe

jobs:
  probe:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup R
        uses: r-lib/actions/setup-r@v2
        with:
          use-public-rspm: true

      - name: Setup R dependencies
        uses: r-lib/actions/setup-r-dependencies@v2
        with:
          extra-packages: local::.
          needs: website

      - name: Profile save_plot components
        run: Rscript .github/workflows/perf-probe.R

      - name: Setup Quarto
        uses: quarto-dev/quarto-actions/setup@v2

      - name: Build minimal repro qmd
        run: |
          mkdir -p /tmp/probe-qmd
          cp .github/workflows/perf-probe-repro.qmd /tmp/probe-qmd/repro.qmd

      - name: Render repro via quarto (timed)
        run: |
          cd /tmp/probe-qmd
          time quarto render repro.qmd
          grep -h PROBE repro.html || true

      - name: Render repro via bare knitr (timed)
        run: |
          cd /tmp/probe-qmd
          time Rscript -e 'knitr::knit("repro.qmd", output="knitr-out.md", quiet=TRUE)'
          grep PROBE knitr-out.md || true

      # Round 3: standalone-quarto was FAST (7s). The stall only shows in
      # the full-site render. Bisect: (a) single page in PROJECT context,
      # (b) memory accounting to test cumulative-pressure theory.
      - name: Render export.qmd in site-project context (timed + RSS)
        run: |
          free -m
          /usr/bin/time -v quarto render docs/guide/export.qmd 2>&1 | grep -E "Output created|Maximum resident|Elapsed|Swaps|processing file|unnamed-chunk" || true
          free -m
