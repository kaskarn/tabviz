on:
  push:
    branches: [main, master]
  workflow_dispatch:

name: Quarto Publish

# GitHub forces JS actions onto Node 24 on 2026-06-16; opt in early so
# the cutover is verified green rather than discovered broken.
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

permissions:
  contents: write
  pages: write

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    env:
      GITHUB_PAT: ${{ secrets.GITHUB_TOKEN }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup R
        uses: r-lib/actions/setup-r@v2
        with:
          use-public-rspm: true

      - name: Setup R dependencies
        uses: r-lib/actions/setup-r-dependencies@v2
        with:
          extra-packages: local::.
          needs: website

      - name: Setup Quarto
        uses: quarto-dev/quarto-actions/setup@v2

      # NO --cache-refresh: that flag does not merely bust caches — it
      # forces the knitr cache engine ON (overriding `cache: false` in
      # _quarto.yml) in write mode, so every chunk's objects are
      # serialized to knitr's lazy-load DB. tabviz chunks hold
      # htmlwidgets + S7 specs whose environments/bytecode serialize
      # pathologically: guide/export.qmd alone went 14s → 8-17 MINUTES
      # (R pinned at 100% CPU inside WriteItem/WriteBC1, ~3GB heap).
      # The rm -rf below is the real "fresh render" guarantee.
      - name: Render site
        env:
          QUARTO_CACHE: "false"
        run: |
          rm -rf docs/_freeze docs/_site docs/.quarto
          quarto render docs

      - name: Deploy to GitHub Pages
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          clean: true
          clean-exclude: |
            .nojekyll
            CNAME
          single-commit: true
          branch: gh-pages
          folder: docs/_site
