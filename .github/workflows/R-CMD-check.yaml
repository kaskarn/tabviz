on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

name: R-CMD-check

# GitHub forces JS actions onto Node 24 on 2026-06-16; opt in early so
# the cutover is verified green rather than discovered broken.
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  R-CMD-check:
    runs-on: ${{ matrix.config.os }}

    name: ${{ matrix.config.os }} (${{ matrix.config.r }})

    strategy:
      fail-fast: false
      matrix:
        config:
          - {os: macos-latest,   r: 'release'}
          - {os: windows-latest, r: 'release'}
          - {os: ubuntu-latest,  r: 'devel', http-user-agent: 'release'}
          - {os: ubuntu-latest,  r: 'release'}
          - {os: ubuntu-latest,  r: 'oldrel-1'}

    env:
      GITHUB_PAT: ${{ secrets.GITHUB_TOKEN }}
      R_KEEP_PKG_SOURCE: yes

    steps:
      - uses: actions/checkout@v4

      - uses: r-lib/actions/setup-pandoc@v2

      - uses: r-lib/actions/setup-r@v2
        with:
          r-version: ${{ matrix.config.r }}
          http-user-agent: ${{ matrix.config.http-user-agent }}
          use-public-rspm: true

      - uses: r-lib/actions/setup-r-dependencies@v2
        with:
          extra-packages: any::rcmdcheck
          needs: check

      # R↔TS source-parse sync gates (wire-version, glyph + interaction rosters)
      # read the TS source via ../../srcjs and skip_if_not when it's absent. The
      # R CMD check below runs from a tarball that EXCLUDES srcjs/ (.Rbuildignore),
      # so those gates SKIP there — they only have teeth in-tree. Run them here on
      # the checked-out repo (srcjs present) so R↔TS drift actually fails CI.
      # ubuntu/release only: the gates are OS-independent (pure source parse).
      - name: R↔TS sync gates (in-tree; tarball check excludes srcjs/)
        if: matrix.config.os == 'ubuntu-latest' && matrix.config.r == 'release'
        run: |
          R CMD INSTALL --no-multiarch --with-keep.source .
          Rscript -e 'library(testthat); library(tabviz); test_dir("tests/testthat", filter = "wire-version|glyph-roster-sync|interaction-roster-sync", stop_on_failure = TRUE)'

      - uses: r-lib/actions/check-r-package@v2
        with:
          upload-snapshots: true
          build_args: 'c("--no-manual","--compact-vignettes=gs+qpdf")'
